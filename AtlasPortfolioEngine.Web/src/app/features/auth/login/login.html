<div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 mb-4 shadow-lg">
        <span class="text-white font-bold text-2xl">A</span>
      </div>
      <h1 class="text-3xl font-bold text-white">Atlas</h1>
      <p class="text-slate-400 text-sm mt-1">Portfolio Engine &middot; Advisor Portal</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <!-- Error -->
      @if (error) {
        <div class="mb-5 p-3 bg-rose-50 border border-rose-200 rounded-lg text-sm text-rose-600 flex items-center gap-2">
          <span class="font-bold">&#10005;</span>
          {{ error }}
        </div>
      }

      <!-- Form -->
      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            required
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            placeholder="advisor"
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-all shadow-md hover:shadow-indigo-300/40 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <p class="text-xs text-slate-400 text-center mt-5">
        Demo &mdash; <span class="font-mono">advisor / atlas2026</span>
      </p>
    </div>

  </div>
</div>
