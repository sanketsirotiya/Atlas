<!-- Hamburger: fixed top-right, above everything -->
<button
  class="fixed top-4 right-4 z-[60] md:hidden w-9 h-9 bg-slate-900 text-white rounded-lg flex items-center justify-center shadow-lg"
  (click)="toggle()"
>
  @if (open) {
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  } @else {
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  }
</button>

<!-- Backdrop: fades in/out -->
<div
  class="fixed inset-0 z-40 md:hidden transition-opacity duration-200"
  [ngClass]="open ? 'opacity-100 bg-black/60 pointer-events-auto' : 'opacity-0 pointer-events-none'"
  (click)="close()"
></div>

<!-- Nav Panel: slides in from left on mobile, always visible on desktop -->
<nav
  class="fixed md:static inset-y-0 left-0 z-50 w-64 min-h-screen bg-slate-950 flex flex-col transition-transform duration-200 ease-in-out md:translate-x-0"
  [ngClass]="open ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
>

  <!-- Logo -->
  <div class="px-6 py-6 border-b border-slate-800">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      </div>
      <div>
        <p class="text-white font-bold text-sm leading-tight">Atlas</p>
        <p class="text-slate-500 text-xs">Portfolio Engine</p>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <div class="flex-1 px-3 py-4 space-y-1">

    <button
      (click)="navigate('/clients')"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors"
      [ngClass]="isActive('clients')
        ? 'bg-indigo-600 text-white'
        : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'"
    >
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      All Clients
    </button>

    @if (clientId) {
      <div class="pt-2 pb-1 px-3">
        <p class="text-xs font-semibold text-slate-600 uppercase tracking-wider">Client Pages</p>
      </div>

      <button
        (click)="navigate('/clients/' + clientId + '/portfolio')"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors"
        [ngClass]="isActive('portfolio') ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'"
      >
        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" [ngClass]="isActive('portfolio') ? 'bg-indigo-400' : 'bg-slate-700'"></span>
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        Portfolio
      </button>

      <button
        (click)="navigate('/clients/' + clientId + '/drift')"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors"
        [ngClass]="isActive('drift') ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'"
      >
        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" [ngClass]="isActive('drift') ? 'bg-amber-400' : 'bg-slate-700'"></span>
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Drift Report
      </button>

      <button
        (click)="navigate('/clients/' + clientId + '/rebalance')"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors"
        [ngClass]="isActive('rebalance') ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'"
      >
        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" [ngClass]="isActive('rebalance') ? 'bg-emerald-400' : 'bg-slate-700'"></span>
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Rebalance
      </button>

      <button
        (click)="navigate('/clients/' + clientId + '/suitability')"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors"
        [ngClass]="isActive('suitability') ? 'bg-slate-800 text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-100'"
      >
        <span class="w-1.5 h-1.5 rounded-full flex-shrink-0" [ngClass]="isActive('suitability') ? 'bg-violet-400' : 'bg-slate-700'"></span>
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
        Suitability
      </button>
    }

  </div>

  <!-- Logout -->
  <div class="px-3 py-4 border-t border-slate-800">
    <button
      (click)="logout()"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:bg-rose-500/10 hover:text-rose-400 transition-colors"
    >
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Logout
    </button>
  </div>

</nav>
